<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Klub kabrioletů</title>

<style>

/* =========================
   BACKGROUND (FLOATING)
========================= */

body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: #e9eaee;
    overflow-x: hidden;
}

/* floating blobs */
.background {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    overflow: hidden;
}

.blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.4;
    animation: float 12s infinite ease-in-out;
}

.blob1 {
    width: 300px;
    height: 300px;
    background: #b6c6ff;
    top: 10%;
    left: 10%;
}

.blob2 {
    width: 400px;
    height: 400px;
    background: #ffb6d5;
    top: 40%;
    left: 60%;
    animation-duration: 18s;
}

.blob3 {
    width: 250px;
    height: 250px;
    background: #b6ffd9;
    top: 70%;
    left: 20%;
    animation-duration: 22s;
}

@keyframes float {
    0%   { transform: translate(0,0) scale(1); }
    50%  { transform: translate(40px,-40px) scale(1.1); }
    100% { transform: translate(0,0) scale(1); }
}

/* =========================
   HEADER
========================= */

.header {
    text-align: center;
    padding: 25px;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid #ddd;
}

.header h1 {
    margin: 0;
    font-size: 26px;
}

/* =========================
   MENU
========================= */

.nav {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
    padding: 15px;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(10px);
}

.nav a {
    text-decoration: none;
}

.nav button {
    padding: 10px 14px;
    border: none;
    background: #e5e5e5;
    border-radius: 10px;
    cursor: pointer;
}

.nav button:hover {
    background: #d6d6d6;
}

/* =========================
   LAYOUT (DASHBOARD GRID)
========================= */

.container {
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 20px;
}

/* cards */
.card {
    background: rgba(255,255,255,0.7);
    border-radius: 20px;
    padding: 15px;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
    position: relative;
}

.section-title {
    font-weight: bold;
    margin-bottom: 15px;
    font-size: 1.1em;
    color: #1c1c1e;
}

/* right column stacking */
.stack {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* =========================
   NATÍVNÍ MOBILNÍ KALENDÁŘ
========================= */

.mobile-calendar {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

/* Horní lišta - Měsíc a ovládání */
.cal-top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.cal-month-title {
    font-size: 1.2em;
    font-weight: 700;
    color: #000;
}

.cal-nav-arrows {
    display: flex;
    gap: 5px;
}

.cal-arrow-btn {
    background: rgba(0,0,0,0.05);
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Horizontální týdenní pás (iOS style) */
.cal-week-strip {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 8px;
    background: rgba(255,255,255,0.4);
    padding: 10px;
    border-radius: 14px;
}

.cal-strip-day {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 8px 0;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s ease;
}

.cal-strip-day .day-name {
    font-size: 0.75em;
    color: #8e8e93;
    text-transform: uppercase;
    margin-bottom: 4px;
    font-weight: 600;
}

.cal-strip-day .day-number {
    font-size: 1.05em;
    font-weight: 600;
    color: #1c1c1e;
    width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
}

/* Aktivní / Dnešní stavy */
.cal-strip-day.today .day-number {
    border: 2px solid #007aff;
}

.cal-strip-day.selected {
    background: #007aff;
}
.cal-strip-day.selected .day-name,
.cal-strip-day.selected .day-number {
    color: #fff !important;
}

/* Indikátor události (tečka) */
.cal-has-event {
    position: relative;
}
.cal-has-event::after {
    content: '';
    position: absolute;
    bottom: 4px;
    width: 4px;
    height: 4px;
    background: #ff3b30;
    border-radius: 50%;
}
.cal-strip-day.selected.cal-has-event::after {
    background: #fff;
}

/* Výpis agendy pod kalendářem */
.agenda-section {
    margin-top: 5px;
}

.agenda-title {
    font-size: 0.9em;
    font-weight: 600;
    color: #8e8e93;
    margin-bottom: 10px;
}

.agenda-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.agenda-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #fff;
    padding: 12px 15px;
    border-radius: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.03);
    border-left: 4px solid #007aff;
}

.agenda-text {
    font-size: 0.95em;
    color: #1c1c1e;
    flex: 1;
}

.agenda-actions {
    display: flex;
    gap: 10px;
}

.agenda-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 0.9em;
}
