<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Klub kabrioletů</title>

<style>

/* =========================
   BACKGROUND (FLOATING)
========================= */

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #e9eaee;
    overflow-x: hidden;
}

/* floating blobs */
.background {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    overflow: hidden;
}

.blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.4;
    animation: float 12s infinite ease-in-out;
}

.blob1 {
    width: 300px;
    height: 300px;
    background: #b6c6ff;
    top: 10%;
    left: 10%;
}

.blob2 {
    width: 400px;
    height: 400px;
    background: #ffb6d5;
    top: 40%;
    left: 60%;
    animation-duration: 18s;
}

.blob3 {
    width: 250px;
    height: 250px;
    background: #b6ffd9;
    top: 70%;
    left: 20%;
    animation-duration: 22s;
}

@keyframes float {
    0%   { transform: translate(0,0) scale(1); }
    50%  { transform: translate(40px,-40px) scale(1.1); }
    100% { transform: translate(0,0) scale(1); }
}

/* =========================
   HEADER
========================= */

.header {
    text-align: center;
    padding: 25px;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid #ddd;
}

.header h1 {
    margin: 0;
    font-size: 26px;
}

/* =========================
   MENU
========================= */

.nav {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
    padding: 15px;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(10px);
}

.nav a {
    text-decoration: none;
}

.nav button {
    padding: 10px 14px;
    border: none;
    background: #e5e5e5;
    border-radius: 10px;
    cursor: pointer;
}

.nav button:hover {
    background: #d6d6d6;
}

/* =========================
   LAYOUT (DASHBOARD GRID)
========================= */

.container {
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 20px;
}

/* cards */
.card {
    background: rgba(255,255,255,0.7);
    border-radius: 20px;
    padding: 15px;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.section-title {
    font-weight: bold;
    margin-bottom: 10px;
}

/* right column stacking */
.stack {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* responsive */
@media(max-width: 900px){
    .grid {
        grid-template-columns: 1fr;
    }
}

</style>
</head>

<body>

<!-- FLOATING BACKGROUND -->
<div class="background">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
</div>

<!-- HEADER -->
<div class="header">
    <h1>Klub kabrioletů</h1>
</div>

<!-- MENU -->
<div class="nav">
    <a href="stanovy.html"><button>Veřejné stanovy</button></a>
    <a href="kontakt.html"><button>Kontakt</button></a>
    <a href="akce.html"><button>Nadcházející akce</button></a>
    <a href="kalendar.html"><button>Kalendář iOS</button></a>
    <a href="design.html"><button>Neumorphic design</button></a>
    <a href="dashboard.html"><button>Dashboard</button></a>
</div>

<!-- GAP -->
<div style="height: 20px;"></div>

<!-- CONTENT -->
<div class="container">

    <div class="grid">

        <!-- LEFT COLUMN -->
        <div class="card">
            <div class="section-title">TO-DO list</div>
            <p>
                text<br>
                test
            </p>
        </div>

        <!-- RIGHT COLUMN -->
        <div class="stack">

            <div class="card">
                <div class="section-title">Application monitoring</div>
                <p>Here could be application alerts...</p>
                <p>DB checks, config validation, etc.</p>
            </div>

            <div class="card">
                <div class="section-title">Some other stuff</div>
                <p>Other content</p>
            </div>

            <div class="card">
                <div class="section-title">Some other stuff</div>
                <p>Empty block</p>
            </div>

        </div>

    </div>

</div>

</body>
</html>
