<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topless Cabriolet Society</title>

<style>
body {
  margin: 0;
  font-family: Race Sport;
  color: #111827;
  overflow-x: hidden;
}

/* BACKGROUND */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url("bck2.png") no-repeat center center;
  background-size: cover;
  z-index: -3;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -2;
  pointer-events: none;
  background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.25), transparent 60%);
}

/* ================= HEADER ================= */
.header-container {
  margin: 25px 20px 0 20px;
  padding: 25px;
  text-align: center;
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.6);
}

/* ================= NAV BUTTONS ================= */
.nav button,
.calendar-header button,
.modal-btn {
  padding: 12px 20px;
  background: rgba(255,255,255,0.8);
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 14px;
  cursor: pointer;
  font-weight: 600;
  transition: 0.2s;
  box-shadow: 3px 3px 8px rgba(0,0,0,0.12),
              -3px -3px 8px rgba(255,255,255,0.6);
}

.nav button:hover,
.calendar-header button:hover,
.modal-btn:hover {
  transform: translateY(-1px);
}

.nav button:active,
.calendar-header button:active,
.modal-btn:active {
  box-shadow: inset 2px 2px 6px rgba(0,0,0,0.15);
}

/* ================= LAYOUT ================= */
.container { padding: 20px; }

.grid {
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 25px;
}

.stack { display: flex; flex-direction: column; gap: 25px; }

.sub-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 25px;
}

/* ================= CARDS ================= */
.card {
  background: rgba(255,255,255,0.85);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 30px;
  border: 1px solid rgba(255,255,255,0.6);
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
}

.section-title {
  font-weight: 700;
  font-size: 19px;
  margin-bottom: 18px;
  border-bottom: 2px solid rgba(0,0,0,0.15);
}

/* ================= CALENDAR ================= */
.calendar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  font-size: 11px;
  opacity: 0.6;
  text-align: center;
  margin-bottom: 6px;
}

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}

.day {
  background: rgba(255,255,255,0.85);
  border-radius: 10px;
  min-height: 48px;
  padding: 6px;
  font-size: 12px;
  position: relative;
  cursor: pointer;
  border: 1px solid rgba(0,0,0,0.08);
}

/* 🔴 EVENT DAY */
.day.event {
  background: rgba(255, 100, 100, 0.25);
  border: 1px solid rgba(255, 80, 80, 0.6);
}

/* 🟢 TODAY */
.day.today {
  border: 2px solid #2ecc71;
  background: rgba(46, 204, 113, 0.15);
}

/* ================= MODAL ================= */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-box {
  background: white;
  padding: 18px;
  border-radius: 14px;
  width: 280px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.modal-box input {
  padding: 10px;
  border-radius: 10px;
  border: 1px solid #ddd;
  outline: none;
}

/* ================= RESPONSIVE ================= */
@media(max-width: 900px){
  .grid { grid-template-columns: 1fr; }
  .sub-grid { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<div class="header-container">
  <h1>Topless Cabriolet Society</h1>

  <div class="nav">
    <button>Veřejné stanovy</button>
    <button>Fotogalerie</button>
  </div>
</div>

<div class="container">
  <div class="grid">

    <!-- CALENDAR -->
    <div class="card">
      <div class="section-title">Kalendář</div>

      <div class="calendar-header">
        <button onclick="prevMonth()">◀</button>
        <div id="monthLabel"></div>
        <button onclick="nextMonth()">▶</button>
      </div>

      <div class="weekdays">
        <div>Po</div><div>Út</div><div>St</div><div>Čt</div><div>Pá</div><div>So</div><div>Ne</div>
      </div>

      <div class="calendar-grid" id="calendar"></div>
    </div>

    <!-- PANELS -->
    <div class="stack">

      <div class="card">
        <div class="section-title">Nadcházející akce</div>
        <p>Žádné akce</p>
      </div>

      <div class="sub-grid">

        <div class="card">
          <div class="section-title">Základní informace</div>
          <p>Počet členů: <strong>5</strong></p>
          <p>Datum založení: <strong>14.06.2026</strong></p>
          <p>Nejstarší vůz: <strong>—</strong></p>
          <p>Největší objem: <strong>—</strong></p>
        </div>

        <div class="card">
          <div class="section-title">Kontakt</div>
          <p><strong>topcab@seznam.cz</strong></p>
        </div>

      </div>

    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <input id="eventText" placeholder="Událost...">
    <button class="modal-btn" onclick="saveEvent()">Uložit</button>
    <button class="modal-btn" onclick="deleteEvent()">Smazat</button>
    <button class="modal-btn" onclick="closeModal()">Zavřít</button>
  </div>
</div>

<script>
let date = new Date();
let selected = null;

/* ================== EVENTS FROM SERVER FILE ================== */
let events = {};

async function loadEvents(){
  try {
    const res = await fetch("events.json?v=" + Date.now());
    events = await res.json();
  } catch {
    events = {};
  }
}

function saveLocal(){
  localStorage.setItem("events_backup", JSON.stringify(events));
}

/* ================== CALENDAR ================== */
function render(){
  const cal = document.getElementById("calendar");
  const label = document.getElementById("monthLabel");

  cal.innerHTML = "";

  const y = date.getFullYear();
  const m = date.getMonth();

  label.textContent = date.toLocaleString("cs-CZ",{month:"long",year:"numeric"});

  const first = new Date(y,m,1).getDay();
  const offset = first === 0 ? 6 : first - 1;
  const days = new Date(y,m+1,0).getDate();

  const today = new Date();

  for(let i=0;i<offset;i++) cal.innerHTML += `<div></div>`;

  for(let d=1; d<=days; d++){
    const key = `${y}-${m}-${d}`;

    let cls = "day";
    if(events[key]) cls += " event";
    if(y===today.getFullYear() && m===today.getMonth() && d===today.getDate()) cls += " today";

    cal.innerHTML += `
      <div class="${cls}" onclick="openModal('${key}')">
        ${d}
      </div>
    `;
  }
}

/* ================== MODAL CRUD ================== */
function openModal(k){
  selected = k;
  document.getElementById("eventText").value = events[k] || "";
  document.getElementById("modal").style.display = "flex";
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

function saveEvent(){
  const val = document.getElementById("eventText").value.trim();

  if(val){
    events[selected] = val;
  } else {
    delete events[selected];
  }

  saveLocal(); // fallback
  render();
  closeModal();
}

function deleteEvent(){
  delete events[selected];
  saveLocal();
  render();
  closeModal();
}

/* ================== NAV ================== */
function nextMonth(){ date.setMonth(date.getMonth()+1); render(); }
function prevMonth(){ date.setMonth(date.getMonth()-1); render(); }

/* ================== INIT ================== */
(async function(){
  await loadEvents();
  render();
})();
</script>

</body>
</html>
