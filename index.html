<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Topless Cabriolet Society</title>

<style>
/* ========================= BASE ========================= */
body {
  margin: 0;
  font-family: Race Sport;
  color: #111827;
  overflow-x: hidden;
  position: relative;
}

/* BACKGROUND */
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url("bck2.png") no-repeat center center;
  background-size: cover;
  z-index: -3;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  z-index: -2;
  pointer-events: none;
  background: radial-gradient(circle at 30% 20%, rgba(255,255,255,0.25), transparent 60%);
}

/* ========================= HEADER ========================= */
.header-container {
  margin: 25px 20px 0 20px;
  padding: 25px;
  text-align: center;
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  border: 1px solid rgba(255,255,255,0.6);
}

/* ========================= LAYOUT ========================= */
.container { padding: 20px; }

.grid {
  display: grid;
  grid-template-columns: 1fr 2fr;
  gap: 25px;
}

.stack {
  display: flex;
  flex-direction: column;
  gap: 25px;
}

.sub-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 25px;
}

/* ========================= CARD ========================= */
.card {
  background: rgba(255, 255, 255, 0.85);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 30px;
  border: 1px solid rgba(255,255,255,0.6);
}

.section-title {
  font-weight: 700;
  font-size: 19px;
  margin-bottom: 18px;
  border-bottom: 2px solid rgba(0,0,0,0.15);
  padding-bottom: 8px;
}

/* ========================= CALENDAR ========================= */
.calendar-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.calendar-header button {
  background: white;
  border: 1px solid #ddd;
  padding: 6px 10px;
  border-radius: 8px;
  cursor: pointer;
}

.weekdays {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  font-size: 11px;
  font-weight: bold;
  opacity: 0.6;
  margin-bottom: 5px;
  text-align: center;
}

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 6px;
}

.day {
  background: rgba(255,255,255,0.85);
  border: 1px solid rgba(0,0,0,0.08);
  border-radius: 10px;
  min-height: 50px;
  font-size: 12px;
  padding: 6px;
  cursor: pointer;
  position: relative;
  transition: 0.15s;
}

.day:hover {
  transform: scale(1.02);
}

.day.event {
  background: rgba(255, 120, 120, 0.35);
  border: 1px solid rgba(255, 80, 80, 0.6);
}

.event-dot {
  width: 6px;
  height: 6px;
  background: #b00020;
  border-radius: 50%;
  position: absolute;
  bottom: 6px;
  right: 6px;
}

/* ========================= MODAL ========================= */
.modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  display: none;
  align-items: center;
  justify-content: center;
}

.modal-box {
  background: white;
  padding: 20px;
  border-radius: 12px;
  width: 280px;
}

.modal-box input {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
}

/* ========================= RESPONSIVE ========================= */
@media(max-width: 900px){
  .grid { grid-template-columns: 1fr; }
  .sub-grid { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<div class="header-container">
  <h1>Topless Cabriolet Society</h1>
</div>

<div class="container">
  <div class="grid">

    <!-- CALENDAR -->
    <div class="card">
      <div class="section-title">Kalendář</div>

      <div class="calendar-header">
        <button onclick="prevMonth()">◀</button>
        <div id="monthLabel"></div>
        <button onclick="nextMonth()">▶</button>
      </div>

      <div class="weekdays">
        <div>Po</div><div>Út</div><div>St</div><div>Čt</div><div>Pá</div><div>So</div><div>Ne</div>
      </div>

      <div class="calendar-grid" id="calendar"></div>
    </div>

    <!-- RIGHT -->
    <div class="stack">

      <div class="card">
        <div class="section-title">Nadcházející akce</div>
        <p>Žádné akce</p>
      </div>

      <div class="sub-grid">

        <div class="card">
          <div class="section-title">Základní informace</div>
          <p>Počet členů: <strong>5</strong></p>
          <p>Datum založení: <strong>14.06.2026</strong></p>
        </div>

        <div class="card">
          <div class="section-title">Kontakt</div>
          <p><strong>topcab@seznam.cz</strong></p>
        </div>

      </div>

    </div>
  </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-box">
    <input id="eventText" placeholder="Název události">
    <button onclick="saveEvent()">Uložit</button>
    <button onclick="deleteEvent()">Smazat</button>
    <button onclick="closeModal()">Zavřít</button>
  </div>
</div>

<script>
let date = new Date();
let selectedKey = null;

function getEvents(){
  return JSON.parse(localStorage.getItem("events") || "{}");
}

function saveEvents(data){
  localStorage.setItem("events", JSON.stringify(data));
}

function renderCalendar(){
  const cal = document.getElementById("calendar");
  const label = document.getElementById("monthLabel");

  cal.innerHTML = "";

  const year = date.getFullYear();
  const month = date.getMonth();

  label.textContent = date.toLocaleString("cs-CZ",{month:"long",year:"numeric"});

  const firstDay = new Date(year, month, 1).getDay();
  const offset = (firstDay === 0 ? 6 : firstDay - 1);
  const days = new Date(year, month+1, 0).getDate();

  const events = getEvents();

  for(let i=0;i<offset;i++){
    cal.innerHTML += `<div></div>`;
  }

  for(let d=1; d<=days; d++){
    const key = `${year}-${month}-${d}`;
    const has = events[key];

    cal.innerHTML += `
      <div class="day ${has ? 'event' : ''}" onclick="openModal('${key}')">
        ${d}
        ${has ? '<div class="event-dot"></div>' : ''}
      </div>
    `;
  }
}

function openModal(key){
  selectedKey = key;
  const events = getEvents();
  document.getElementById("eventText").value = events[key] || "";
  document.getElementById("modal").style.display = "flex";
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

function saveEvent(){
  const events = getEvents();
  const val = document.getElementById("eventText").value;
  events[selectedKey] = val;
  saveEvents(events);
  closeModal();
  renderCalendar();
}

function deleteEvent(){
  const events = getEvents();
  delete events[selectedKey];
  saveEvents(events);
  closeModal();
  renderCalendar();
}

function nextMonth(){
  date.setMonth(date.getMonth()+1);
  renderCalendar();
}

function prevMonth(){
  date.setMonth(date.getMonth()-1);
  renderCalendar();
}

renderCalendar();
</script>

</body>
</html>
