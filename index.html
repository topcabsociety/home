<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Klub kabrioletů</title>

<style>

/* =========================
   BACKGROUND (FLOATING)
========================= */

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #e9eaee;
    overflow-x: hidden;
}

/* floating blobs */
.background {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: -1;
    overflow: hidden;
}

.blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.4;
    animation: float 12s infinite ease-in-out;
}

.blob1 {
    width: 300px;
    height: 300px;
    background: #b6c6ff;
    top: 10%;
    left: 10%;
}

.blob2 {
    width: 400px;
    height: 400px;
    background: #ffb6d5;
    top: 40%;
    left: 60%;
    animation-duration: 18s;
}

.blob3 {
    width: 250px;
    height: 250px;
    background: #b6ffd9;
    top: 70%;
    left: 20%;
    animation-duration: 22s;
}

@keyframes float {
    0%   { transform: translate(0,0) scale(1); }
    50%  { transform: translate(40px,-40px) scale(1.1); }
    100% { transform: translate(0,0) scale(1); }
}

/* =========================
   HEADER
========================= */

.header {
    text-align: center;
    padding: 25px;
    background: rgba(255,255,255,0.7);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid #ddd;
}

.header h1 {
    margin: 0;
    font-size: 26px;
}

/* =========================
   MENU
========================= */

.nav {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 10px;
    padding: 15px;
    background: rgba(255,255,255,0.6);
    backdrop-filter: blur(10px);
}

.nav a {
    text-decoration: none;
}

.nav button {
    padding: 10px 14px;
    border: none;
    background: #e5e5e5;
    border-radius: 10px;
    cursor: pointer;
}

.nav button:hover {
    background: #d6d6d6;
}

/* =========================
   LAYOUT (DASHBOARD GRID)
========================= */

.container {
    padding: 20px;
}

.grid {
    display: grid;
    grid-template-columns: 1fr 2fr;
    gap: 20px;
}

/* cards */
.card {
    background: rgba(255,255,255,0.7);
    border-radius: 20px;
    padding: 15px;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

.section-title {
    font-weight: bold;
    margin-bottom: 10px;
}

/* right column stacking */
.stack {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

/* =========================
   MOBILE CALENDAR STYLES
========================= */

.calendar-box {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.calendar-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.calendar-header month-year {
    font-weight: bold;
    font-size: 1.1em;
}

.cal-btn {
    background: #e5e5e5;
    border: none;
    padding: 5px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

.cal-btn:hover {
    background: #d6d6d6;
}

.weekdays {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    text-align: center;
    font-weight: bold;
    font-size: 0.85em;
    color: #666;
}

.days-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 5px;
}

.day {
    aspect-ratio: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    cursor: pointer;
    font-size: 0.9em;
    position: relative;
    transition: background 0.2s;
}

.day:hover {
    background: rgba(0, 0, 0, 0.05);
}

.day.empty {
    cursor: default;
}

.day.empty:hover {
    background: none;
}

.day.selected {
    background: #007aff !important;
    color: white;
    font-weight: bold;
}

.day.today {
    border: 2px solid #007aff;
}

.day-dot {
    position: absolute;
    bottom: 3px;
    width: 5px;
    height: 5px;
    background-color: #ff3b30;
    border-radius: 50%;
}

.day.selected .day-dot {
    background-color: white;
}

/* Agenda / Events Part */
.events-section {
    border-top: 1px solid rgba(0, 0, 0, 0.1);
    padding-top: 15px;
}

.events-header {
    font-size: 0.95em;
    font-weight: bold;
    margin-bottom: 10px;
    color: #333;
}

.event-input-group {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
}

.event-input {
    flex: 1;
    padding: 8px 12px;
    border: 1px solid #ccc;
    border-radius: 10px;
    outline: none;
    font-size: 0.9em;
    background: rgba(255,255,255,0.5);
}

.add-event-btn {
    background: #34c759;
    color: white;
    border: none;
    padding: 8px 14px;
    border-radius: 10px;
    cursor: pointer;
    font-weight: bold;
}

.add-event-btn:hover {
    background: #28a745;
}

.events-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-height: 180px;
    overflow-y: auto;
}

.event-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255, 255, 255, 0.6);
    padding: 8px 12px;
    border-radius: 10px;
    border-left: 4px solid #007aff;
    font-size: 0.9em;
}

.event-text {
    flex: 1;
    cursor: pointer;
    margin-right: 10px;
}

.event-text:focus {
    background: white;
    padding: 2px 5px;
    border-radius: 4px;
    outline: 1px solid #007aff;
}

.delete-event-btn {
    background: none;
    border: none;
    color: #ff3b30;
    cursor: pointer;
    font-weight: bold;
    font-size: 1.1em;
    padding: 0 5px;
}

/* responsive */
@media(max-width: 900px){
    .grid {
        grid-template-columns: 1fr;
    }
}

</style>
</head>
